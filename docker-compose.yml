# Root Docker Compose
# Components: Backend (Django), Frontend (React)
# Versions:
#   - Docker Compose: 3.8
#   - Backend: Python 3.12-slim, Django 6.0.5
#   - Frontend: Node 20-slim, React 18.2.0

version: '3.8'

services:
  backend:
    build:
      context: ./Backend
    container_name: syn_backend_root
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    environment:
      - DEBUG=True

  frontend:
    build:
      context: ./Frontend
    container_name: syn_frontend_root
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
